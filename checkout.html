<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Checkout - Mie Pedes Meledak</title>

    <link rel="stylesheet" href="style.css">

    <link rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
</head>

<body>

<header>

    <div class="logo">
        🌶️ Mie Pedes Meledak
    </div>

    <nav>
        <a href="index.html">Beranda</a>
        <a href="menu.html">Menu</a>
        <a href="keranjang.html">
            <i class="fa-solid fa-cart-shopping"></i>
        </a>

        <a href="login.html" class="login-btn">
            Login
        </a>
    </nav>

</header>

<section class="checkout-page">

    <div class="section-title">

        <h2>Checkout</h2>

        <p>
            Lengkapi data pemesanan Anda.
        </p>

    </div>

    <div class="checkout-container">

        <!-- FORM -->
        <div class="checkout-form">

            <h3>Informasi Pengiriman</h3>

            <form>

                <div class="form-group">

                    <label>Nama Lengkap</label>

                    <input type="text"
                    placeholder="Masukkan nama">

                </div>

                <div class="form-group">

                    <label>Nomor Telepon</label>

                    <input type="tel"
                    placeholder="08xxxxxxxxxx">

                </div>

                <div class="form-group">

                    <label>Alamat Lengkap</label>

                    <textarea rows="5"
                    placeholder="Masukkan alamat lengkap"></textarea>

                </div>

                <div class="form-group">

                    <label>Catatan Pesanan</label>

                    <textarea rows="4"
                    placeholder="Contoh: jangan terlalu pedas"></textarea>

                </div>

            </form>

        </div>

        <!-- RINGKASAN -->
        <div class="checkout-summary">

            <h3>Ringkasan Pembayaran</h3>

            <div class="summary-item">

                <span>Mie Meledak Komplit</span>

                <span>Rp28.000</span>

            </div>

            <div class="summary-item">

                <span>Es Teh Manis</span>

                <span>Rp12.000</span>

            </div>

            <div class="summary-item">

                <span>Biaya Layanan</span>

                <span>Rp2.000</span>

            </div>

            <div class="summary-item">

                <span>Ongkir</span>

                <span>Rp5.000</span>

            </div>

            <hr>

            <div class="summary-item total">

                <span>Total</span>

                <span>Rp47.000</span>

            </div>

            <a href="metode-pembayaran.html"
            class="btn-primary checkout-btn">

                Pilih Metode Pembayaran

            </a>

        </div>

    </div>

</section>

<footer>

    © 2026 Mie Pedes Meledak

</footer>

</body>
</html>
